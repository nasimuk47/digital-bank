<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bank Page</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body>
        <section>
            <h1 class="text-5xl text-center mt-6">
                Purbadhala Public
                <span class="font-bold text-violet-600">Bank</span>
            </h1>

            <div class="bg-blue-100 w-9/12 mx-auto mt-12 p-8 rounded-lg">
                <h3 class="text-2xl font-medium mb-2">Please Log In</h3>
                <input
                    class="w-9/12 block mb-2 px-3 rounded-lg"
                    type="email"
                    name=""
                    id="email-address"
                    placeholder="Enter your email" />
                <input
                    class="w-9/12 block mb-2 px-3 rounded-lg"
                    type="password"
                    name=""
                    id="password-address"
                    placeholder="Enter your password" />
                <button
                    id="btn-submit"
                    class="bg-purple-600 hover:bg-red-500 px-8 py-2 text-white font-medium rounded-lg">
                    Submit
                </button>
            </div>
        </section>
        <script src="js/login.js"></script>
    </body>
</html>
